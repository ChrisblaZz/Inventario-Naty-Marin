<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Inventario · Naty Marín Wellbeing Concept</title>
<style>
  :root{
    --sage-900:#2b3b30;
    --sage-700:#3f5a47;
    --sage-500:#5c7d63;
    --sage-300:#9db49f;
    --sage-100:#e4ebe2;
    --cream:#f7f4ed;
    --cream-2:#efe9dc;
    --terracotta:#c1693f;
    --terracotta-dark:#a3522e;
    --ink:#26302a;
    --muted:#6c7a70;
    --line:#dcd6c6;
    --white:#fffdf8;
    --danger:#b8493b;
    --warn:#c08a2e;
    --ok:#3f7d52;
    --radius:10px;
    --shadow:0 1px 2px rgba(38,48,42,.06), 0 6px 18px rgba(38,48,42,.06);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Söhne','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:var(--cream);
    color:var(--ink);
    min-height:100vh;
  }
  ::selection{background:var(--sage-300);color:var(--sage-900);}

  .app{display:flex; min-height:100vh;}

  /* ---------- Sidebar ---------- */
  .sidebar{
    width:268px; min-width:268px;
    background:var(--sage-900);
    color:var(--cream);
    display:flex; flex-direction:column;
    padding:22px 16px 16px;
  }
  .brand{
    display:flex; align-items:center; gap:10px;
    padding:0 6px 18px;
    border-bottom:1px solid rgba(255,255,255,.12);
    margin-bottom:14px;
  }
  .brand .mark{
    width:34px;height:34px;border-radius:9px;
    background:linear-gradient(135deg,var(--terracotta),#dd8b5e);
    display:flex;align-items:center;justify-content:center;
    font-family:Georgia,'Times New Roman',serif; font-weight:700; font-size:17px; color:#fff;
    flex:none;
  }
  .brand .name{font-size:13px; line-height:1.25; font-weight:600; letter-spacing:.2px;}
  .brand .sub{font-size:10.5px; color:var(--sage-300); letter-spacing:.4px; text-transform:uppercase; margin-top:1px;}

  .nav-tabs{display:flex; flex-direction:column; gap:4px; margin-bottom:18px;}
  .nav-tab{
    display:flex; align-items:center; justify-content:space-between;
    padding:9px 11px; border-radius:8px; cursor:pointer;
    font-size:13.5px; color:var(--sage-100); border:1px solid transparent;
    transition:background .15s ease;
  }
  .nav-tab:hover{background:rgba(255,255,255,.06);}
  .nav-tab.active{background:rgba(255,255,255,.12); border-color:rgba(255,255,255,.1); font-weight:600;}
  .nav-tab .count{
    font-size:10.5px; background:rgba(255,255,255,.14); padding:1px 7px; border-radius:99px; color:var(--cream);
  }
  .nav-tab.active .count{background:var(--terracotta);}

  .cat-label{
    font-size:10.5px; text-transform:uppercase; letter-spacing:.7px; color:var(--sage-300);
    padding:4px 11px; margin-top:4px;
  }
  .cat-list{display:flex; flex-direction:column; gap:1px; overflow-y:auto; flex:1; padding-bottom:8px;}
  .cat-item{
    display:flex; align-items:center; gap:9px;
    padding:7px 11px; border-radius:7px; cursor:pointer; font-size:12.8px; color:var(--sage-100);
    transition:background .15s ease;
  }
  .cat-item:hover{background:rgba(255,255,255,.06);}
  .cat-item.active{background:var(--terracotta); color:#fff; font-weight:600;}
  .cat-item .ic{font-size:14px; width:18px; text-align:center; flex:none; opacity:.9;}
  .cat-item .nm{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .cat-item .ct{font-size:10.5px; opacity:.7;}
  .cat-item.active .ct{opacity:.85;}

  .sidebar-foot{
    border-top:1px solid rgba(255,255,255,.12); padding-top:12px; margin-top:8px;
    font-size:10.5px; color:var(--sage-300); line-height:1.5;
  }

  /* ---------- Main ---------- */
  .main{flex:1; display:flex; flex-direction:column; min-width:0;}
  .topbar{
    padding:18px 28px 14px; border-bottom:1px solid var(--line);
    display:flex; align-items:center; gap:16px; background:var(--white);
    position:sticky; top:0; z-index:5;
  }
  .topbar h1{font-size:18px; margin:0; font-weight:650; letter-spacing:-.2px; white-space:nowrap;}
  .search{
    flex:1; max-width:420px; position:relative;
  }
  .search input{
    width:100%; padding:9px 12px 9px 32px; border-radius:8px; border:1px solid var(--line);
    background:var(--cream); font-size:13.5px; color:var(--ink); outline:none;
  }
  .search input:focus{border-color:var(--sage-500); background:#fff;}
  .search::before{
    content:"⌕"; position:absolute; left:11px; top:50%; transform:translateY(-50%);
    color:var(--muted); font-size:15px;
  }
  .topbar-meta{margin-left:auto; font-size:12px; color:var(--muted); white-space:nowrap;}

  .content{padding:22px 28px 60px; flex:1;}

  .grid{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(258px,1fr)); gap:14px;
  }

  .card{
    background:var(--white); border:1px solid var(--line); border-radius:var(--radius);
    padding:14px 14px 12px; box-shadow:var(--shadow); display:flex; flex-direction:column; gap:8px;
  }
  .card .cat-tag{
    align-self:flex-start; font-size:9.5px; text-transform:uppercase; letter-spacing:.5px;
    background:var(--sage-100); color:var(--sage-700); padding:2px 8px; border-radius:99px; font-weight:700;
  }
  .card h3{margin:0; font-size:14px; line-height:1.32; font-weight:650; color:var(--ink);}
  .card .code{font-size:10.5px; color:var(--muted); font-family:'SFMono-Regular',Consolas,monospace;}
  .card .meta-row{display:flex; gap:14px; font-size:11.5px; color:var(--muted); margin-top:2px;}
  .card .meta-row b{color:var(--ink); font-weight:650;}
  .card .loc{font-size:11.5px; color:var(--muted);}
  .badges{display:flex; gap:6px; flex-wrap:wrap; margin-top:2px;}
  .badge{font-size:10px; padding:2px 7px; border-radius:99px; font-weight:650; letter-spacing:.2px;}
  .badge.estado-en-stock{background:#e3f0e6; color:var(--ok);}
  .badge.estado-agotado{background:#f6e4e0; color:var(--danger);}
  .badge.estado-comprar{background:#fbeed0; color:var(--warn);}
  .badge.estado-default{background:var(--cream-2); color:var(--muted);}
  .badge.pend{background:#fbeed0; color:var(--warn);}

  .card-actions{display:flex; gap:6px; margin-top:auto; padding-top:8px;}
  .btn{
    border:none; cursor:pointer; font-family:inherit; border-radius:7px; font-weight:600;
    font-size:12px; padding:7px 10px; display:inline-flex; align-items:center; gap:5px; transition:filter .12s ease, transform .05s ease;
  }
  .btn:active{transform:scale(.97);}
  .btn-ghost{background:var(--cream-2); color:var(--sage-700);}
  .btn-ghost:hover{filter:brightness(.96);}
  .btn-danger{background:#f6e4e0; color:var(--danger);}
  .btn-danger:hover{filter:brightness(.95);}
  .btn-warn{background:#fbeed0; color:#8a611d;}
  .btn-warn:hover{filter:brightness(.95);}
  .btn-primary{background:var(--terracotta); color:#fff;}
  .btn-primary:hover{background:var(--terracotta-dark);}
  .btn-sm{padding:5px 8px; font-size:11px;}
  .btn-link{background:none; color:var(--sage-700); text-decoration:underline; padding:0; font-size:11.5px;}
  .btn:disabled{opacity:.45; cursor:not-allowed;}

  .empty{
    text-align:center; padding:60px 20px; color:var(--muted);
  }
  .empty .ic{font-size:30px; margin-bottom:8px;}

  /* ---------- Pendientes view ---------- */
  .pend-toolbar{display:flex; align-items:center; gap:10px; margin-bottom:16px; flex-wrap:wrap;}
  .pend-toolbar .spacer{flex:1;}
  .filter-pill{
    font-size:12px; padding:6px 12px; border-radius:99px; border:1px solid var(--line); cursor:pointer;
    background:#fff; color:var(--muted); font-weight:600;
  }
  .filter-pill.active{background:var(--sage-900); color:#fff; border-color:var(--sage-900);}

  .report-row{
    background:var(--white); border:1px solid var(--line); border-radius:var(--radius);
    padding:12px 14px; display:flex; gap:12px; align-items:flex-start; margin-bottom:8px;
  }
  .report-row.resolved{opacity:.55;}
  .report-row .check{
    width:20px;height:20px;border-radius:6px;border:1.5px solid var(--sage-500); cursor:pointer; flex:none;
    display:flex; align-items:center; justify-content:center; margin-top:1px; background:#fff;
  }
  .report-row .check.on{background:var(--sage-700); border-color:var(--sage-700); color:#fff; font-size:13px;}
  .report-body{flex:1; min-width:0;}
  .report-top{display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
  .report-top .item-name{font-weight:650; font-size:13.5px;}
  .tipo-tag{font-size:9.5px; text-transform:uppercase; font-weight:700; padding:2px 7px; border-radius:99px; letter-spacing:.3px;}
  .tipo-tag.dano{background:#f6e4e0; color:var(--danger);}
  .tipo-tag.compra{background:#e3eaf3; color:#3a5a8c;}
  .urg-tag{font-size:9.5px; font-weight:700; padding:2px 7px; border-radius:99px;}
  .urg-alta{background:#f6e4e0; color:var(--danger);}
  .urg-media{background:#fbeed0; color:#8a611d;}
  .urg-baja{background:var(--cream-2); color:var(--muted);}
  .report-desc{font-size:12.5px; color:var(--ink); margin-top:5px; line-height:1.45;}
  .report-foot{font-size:11px; color:var(--muted); margin-top:6px;}
  .report-actions{display:flex; gap:6px; flex:none;}

  /* ---------- Modal ---------- */
  .overlay{
    position:fixed; inset:0; background:rgba(38,48,42,.45); display:flex; align-items:center; justify-content:center;
    z-index:50; padding:20px; opacity:0; pointer-events:none; transition:opacity .15s ease;
  }
  .overlay.show{opacity:1; pointer-events:auto;}
  .modal{
    background:#fff; border-radius:14px; width:100%; max-width:460px; padding:22px 22px 18px;
    box-shadow:0 20px 60px rgba(0,0,0,.25); transform:translateY(8px); transition:transform .15s ease;
    max-height:88vh; overflow-y:auto;
  }
  .overlay.show .modal{transform:translateY(0);}
  .modal h2{margin:0 0 3px; font-size:16.5px;}
  .modal .modal-sub{font-size:12px; color:var(--muted); margin-bottom:16px;}
  .field{margin-bottom:13px;}
  .field label{display:block; font-size:11.5px; font-weight:650; color:var(--sage-700); margin-bottom:5px; text-transform:uppercase; letter-spacing:.3px;}
  .field textarea, .field input, .field select{
    width:100%; padding:9px 10px; border:1px solid var(--line); border-radius:8px; font-family:inherit;
    font-size:13px; outline:none; background:var(--cream);
  }
  .field textarea{min-height:78px; resize:vertical;}
  .field textarea:focus, .field input:focus, .field select:focus{border-color:var(--sage-500); background:#fff;}
  .seg{display:flex; gap:6px;}
  .seg-opt{
    flex:1; text-align:center; padding:8px 6px; border-radius:8px; border:1px solid var(--line); cursor:pointer;
    font-size:12px; font-weight:650; color:var(--muted); background:#fff;
  }
  .seg-opt.on{border-color:var(--terracotta); background:#fbeee6; color:var(--terracotta-dark);}
  .modal-actions{display:flex; justify-content:flex-end; gap:8px; margin-top:6px;}

  /* item edit fields in modal */
  .mini-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}

  .toast{
    position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--sage-900); color:#fff; padding:11px 18px; border-radius:9px; font-size:13px;
    box-shadow:0 8px 24px rgba(0,0,0,.2); opacity:0; pointer-events:none; transition:all .2s ease; z-index:100;
    max-width:90vw;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  .loading-screen{
    display:flex; align-items:center; justify-content:center; height:100vh; width:100%;
    color:var(--muted); font-size:13px; flex-direction:column; gap:10px;
  }

  @media (max-width:860px){
    .sidebar{position:fixed; left:-280px; top:0; bottom:0; z-index:40; transition:left .2s ease; box-shadow:0 0 40px rgba(0,0,0,.3);}
    .sidebar.open{left:0;}
    .menu-btn{display:flex !important;}
    .topbar h1{display:none;}
  }
  .menu-btn{display:none; align-items:center; justify-content:center; width:34px;height:34px; border-radius:8px; background:var(--cream-2); border:none; cursor:pointer; font-size:16px;}
  .scrim{display:none;}
  .scrim.show{display:block; position:fixed; inset:0; background:rgba(0,0,0,.3); z-index:39;}
</style>
</head>

a":"Equipo de fisioterapia"}]</script>
<script>
(function(){
"use strict";

const SEED_ITEMS = JSON.parse(document.getElementById('inv-data').textContent);

const CAT_ICONS = {
  "Mancuernas":"🏋️","Kettlebells":"🔔","Bandas circulares":"🟢","Bandas de potencia":"➰",
  "Teratubos / thera band":"🎗️","Colchonetas":"🟫","Balones medicinales":"🟠",
  "Sacos / bolsas de carga":"🛍️","Bastones / barras":"📏","Cajones pliométricos":"📦",
  "TRX / suspensión":"🪢","Cuerdas / saltar":"🪀","Discos / placas":"⚪",
  "Step / plataformas":"🪜","Conos / agilidad":"🚧","Rodillos / foam roller":"🧻",
  "Bicicletas / cardio":"🚴","Bosu / equilibrio":"🔵","Pelotas":"⚽",
  "Soportes / protección articular":"🦾","Camillas de pilates / Pilates":"🛏️",
  "Máquinas de gimnasio":"⚙️","Equipo de fisioterapia":"🩺",
  "Otros equipos de fuerza":"🏗️","Otros / sin clasificar":"🗂️"
};

let state = {
  items: [],
  reportes: [],
  view: 'inventario', // inventario | pendientes
  activeCat: 'todos',
  search: '',
  pendFilter: 'todos', // todos | dano | compra | resueltos
  destEmail: ''
};

const root = document.getElementById('root');
const toastEl = document.getElementById('toast');

function showToast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(()=>toastEl.classList.remove('show'), 2600);
}

function esc(s){
  return (s==null?'':String(s)).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

async function storageGetSafe(key, shared){
  try{
    const r = await window.storage.get(key, shared);
    return r ? r.value : null;
  }catch(e){ return null; }
}

async function init(){
  let itemsRaw = await storageGetSafe('inventario-items', true);
  if(itemsRaw){
    try{ state.items = JSON.parse(itemsRaw); }catch(e){ state.items = SEED_ITEMS; }
  } else {
    state.items = SEED_ITEMS;
    await window.storage.set('inventario-items', JSON.stringify(state.items), true);
  }

  let repRaw = await storageGetSafe('inventario-reportes', true);
  if(repRaw){
    try{ state.reportes = JSON.parse(repRaw); }catch(e){ state.reportes = []; }
  } else {
    state.reportes = [];
  }

  let cfgRaw = await storageGetSafe('inventario-config', true);
  if(cfgRaw){
    try{ state.destEmail = JSON.parse(cfgRaw).destEmail || ''; }catch(e){}
  }

  render();
}

async function saveItems(){
  await window.storage.set('inventario-items', JSON.stringify(state.items), true);
}
async function saveReportes(){
  await window.storage.set('inventario-reportes', JSON.stringify(state.reportes), true);
}
async function saveConfig(){
  await window.storage.set('inventario-config', JSON.stringify({destEmail: state.destEmail}), true);
}

function getCategories(){
  const map = {};
  state.items.forEach(it=>{ map[it.categoria] = (map[it.categoria]||0)+1; });
  return Object.entries(map).sort((a,b)=> b[1]-a[1]);
}

function pendientesCount(){
  return state.reportes.filter(r=>r.estado==='pendiente').length;
}

function estadoBadgeClass(estado){
  if(!estado) return 'estado-default';
  const e = estado.toLowerCase();
  if(e.includes('stock')) return 'estado-en-stock';
  if(e.includes('agotado')) return 'estado-agotado';
  if(e.includes('comprar')) return 'estado-comprar';
  return 'estado-default';
}

function itemPendientesAbiertos(itemId){
  return state.reportes.filter(r=>r.itemId===itemId && r.estado==='pendiente');
}

function filteredItems(){
  let arr = state.items;
  if(state.activeCat !== 'todos'){
    arr = arr.filter(i=>i.categoria === state.activeCat);
  }
  if(state.search.trim()){
    const q = state.search.trim().toLowerCase();
    arr = arr.filter(i =>
      (i.nombre||'').toLowerCase().includes(q) ||
      (i.codigo||'').toLowerCase().includes(q) ||
      (i.marca||'').toLowerCase().includes(q) ||
      (i.proveedor||'').toLowerCase().includes(q) ||
      (i.ubicacion||'').toLowerCase().includes(q)
    );
  }
  return arr;
}

/* ---------------- RENDER ---------------- */

function render(){
  const cats = getCategories();
  const pendCount = pendientesCount();

  root.innerHTML = `
    <div class="app">
      <div class="scrim" id="scrim"></div>
      <aside class="sidebar" id="sidebar">
        <div class="brand">
          <div class="mark">NM</div>
          <div>
            <div class="name">Naty Marín<br>Wellbeing Concept</div>
            <div class="sub">Inventario I+D+i</div>
          </div>
        </div>
        <div class="nav-tabs">
          <div class="nav-tab ${state.view==='inventario'?'active':''}" data-nav="inventario">
            <span>📋 Inventario</span><span class="count">${state.items.length}</span>
          </div>
          <div class="nav-tab ${state.view==='pendientes'?'active':''}" data-nav="pendientes">
            <span>🛠️ Pendientes</span><span class="count">${pendCount}</span>
          </div>
        </div>
        ${state.view==='inventario' ? `
          <div class="cat-label">Paquetes de implementación</div>
          <div class="cat-list">
            <div class="cat-item ${state.activeCat==='todos'?'active':''}" data-cat="todos">
              <span class="ic">🗃️</span><span class="nm">Todos</span><span class="ct">${state.items.length}</span>
            </div>
            ${cats.map(([cat,count])=>`
              <div class="cat-item ${state.activeCat===cat?'active':''}" data-cat="${esc(cat)}">
                <span class="ic">${CAT_ICONS[cat]||'📦'}</span><span class="nm">${esc(cat)}</span><span class="ct">${count}</span>
              </div>
            `).join('')}
          </div>
        ` : ''}
        <div class="sidebar-foot">Datos guardados automáticamente.<br>Visible para todo el equipo.</div>
      </aside>

      <main class="main">
        <div class="topbar">
          <button class="menu-btn" id="menuBtn">☰</button>
          <h1>${state.view==='inventario' ? (state.activeCat==='todos'?'Todo el inventario':esc(state.activeCat)) : 'Pendientes: daños y compras'}</h1>
          ${state.view==='inventario' ? `
            <div class="search"><input id="searchInput" placeholder="Buscar artículo, código, proveedor, ubicación…" value="${esc(state.search)}"></div>
          ` : ''}
          <div class="topbar-meta">${state.view==='inventario' ? filteredItems().length+' artículos' : pendCount+' pendientes'}</div>
        </div>
        <div class="content" id="contentArea"></div>
      </main>
    </div>
  `;

  document.querySelectorAll('[data-nav]').forEach(el=>{
    el.addEventListener('click', ()=>{ state.view = el.dataset.nav; render(); });
  });
  document.querySelectorAll('[data-cat]').forEach(el=>{
    el.addEventListener('click', ()=>{ state.activeCat = el.dataset.cat; render(); });
  });
  const menuBtn = document.getElementById('menuBtn');
  const sidebar = document.getElementById('sidebar');
  const scrim = document.getElementById('scrim');
  if(menuBtn){
    menuBtn.addEventListener('click', ()=>{ sidebar.classList.add('open'); scrim.classList.add('show'); });
    scrim.addEventListener('click', ()=>{ sidebar.classList.remove('open'); scrim.classList.remove('show'); });
  }
  const searchInput = document.getElementById('searchInput');
  if(searchInput){
    searchInput.addEventListener('input', (e)=>{ state.search = e.target.value; renderContent(); updateTopMeta(); });
    searchInput.focus();
    searchInput.setSelectionRange(searchInput.value.length, searchInput.value.length);
  }

  renderContent();
}

function updateTopMeta(){
  const meta = document.querySelector('.topbar-meta');
  if(meta) meta.textContent = state.view==='inventario' ? filteredItems().length+' artículos' : pendientesCount()+' pendientes';
}

function renderContent(){
  const area = document.getElementById('contentArea');
  if(!area) return;
  if(state.view === 'inventario'){
    area.innerHTML = renderInventarioGrid();
    bindCardActions();
  } else {
    area.innerHTML = renderPendientesView();
    bindPendActions();
  }
}

function renderInventarioGrid(){
  const items = filteredItems();
  if(items.length === 0){
    return `<div class="empty"><div class="ic">🔍</div>No se encontraron artículos con ese criterio.</div>`;
  }
  return `<div class="grid">${items.map(renderCard).join('')}</div>`;
}

function renderCard(it){
  const abiertos = itemPendientesAbiertos(it.id);
  const badgeClass = estadoBadgeClass(it.estado);
  return `
    <div class="card" data-id="${esc(it.id)}">
      <span class="cat-tag">${CAT_ICONS[it.categoria]||'📦'} ${esc(it.categoria)}</span>
      <h3>${esc(it.nombre)}</h3>
      <div class="code">${esc(it.codigo || '—')}${it.marca? ' · '+esc(it.marca):''}</div>
      <div class="meta-row">
        <span>Total: <b>${fmtNum(it.total)}</b></span>
        <span>En uso: <b>${fmtNum(it.uso)}</b></span>
        <span>Bodega: <b>${fmtNum(it.bodega)}</b></span>
      </div>
      ${it.ubicacion ? `<div class="loc">📍 ${esc(it.ubicacion)}</div>` : ''}
      <div class="badges">
        ${it.estado ? `<span class="badge ${badgeClass}">${esc(it.estado)}</span>` : ''}
        ${abiertos.length ? `<span class="badge pend">${abiertos.length} reporte${abiertos.length>1?'s':''} pendiente${abiertos.length>1?'s':''}</span>` : ''}
      </div>
      <div class="card-actions">
        <button class="btn btn-danger btn-sm" data-action="danio" data-id="${esc(it.id)}">⚠️ Daño</button>
        <button class="btn btn-warn btn-sm" data-action="compra" data-id="${esc(it.id)}">🛒 Comprar</button>
        ${it.link ? `<button class="btn btn-ghost btn-sm" data-action="link" data-id="${esc(it.id)}">🔗</button>` : ''}
        <button class="btn btn-ghost btn-sm" data-action="editar" data-id="${esc(it.id)}" style="margin-left:auto;">✎</button>
      </div>
    </div>
  `;
}

function fmtNum(n){
  if(n==null || isNaN(n)) return '0';
  return (n % 1 === 0) ? String(n) : String(n);
}

function bindCardActions(){
  document.querySelectorAll('[data-action="danio"]').forEach(b=>b.addEventListener('click', ()=>openReportModal(b.dataset.id,'dano')));
  document.querySelectorAll('[data-action="compra"]').forEach(b=>b.addEventListener('click', ()=>openReportModal(b.dataset.id,'compra')));
  document.querySelectorAll('[data-action="editar"]').forEach(b=>b.addEventListener('click', ()=>openEditModal(b.dataset.id)));
  document.querySelectorAll('[data-action="link"]').forEach(b=>b.addEventListener('click', ()=>{
    const it = state.items.find(i=>i.id===b.dataset.id);
    if(it && it.link) window.open(it.link, '_blank', 'noopener');
  }));
}

/* ---------------- Pendientes view ---------------- */

function renderPendientesView(){
  let list = state.reportes.slice().sort((a,b)=> b.fecha.localeCompare(a.fecha));
  if(state.pendFilter==='dano') list = list.filter(r=>r.tipo==='dano' && r.estado==='pendiente');
  else if(state.pendFilter==='compra') list = list.filter(r=>r.tipo==='compra' && r.estado==='pendiente');
  else if(state.pendFilter==='resueltos') list = list.filter(r=>r.estado==='resuelto');
  else list = list.filter(r=>r.estado==='pendiente');

  const counts = {
    todos: state.reportes.filter(r=>r.estado==='pendiente').length,
    dano: state.reportes.filter(r=>r.tipo==='dano' && r.estado==='pendiente').length,
    compra: state.reportes.filter(r=>r.tipo==='compra' && r.estado==='pendiente').length,
    resueltos: state.reportes.filter(r=>r.estado==='resuelto').length,
  };

  return `
    <div class="pend-toolbar">
      <span class="filter-pill ${state.pendFilter==='todos'?'active':''}" data-pf="todos">Pendientes (${counts.todos})</span>
      <span class="filter-pill ${state.pendFilter==='dano'?'active':''}" data-pf="dano">Daños (${counts.dano})</span>
      <span class="filter-pill ${state.pendFilter==='compra'?'active':''}" data-pf="compra">Compras (${counts.compra})</span>
      <span class="filter-pill ${state.pendFilter==='resueltos'?'active':''}" data-pf="resueltos">Resueltos (${counts.resueltos})</span>
      <span class="spacer"></span>
      <button class="btn btn-primary btn-sm" id="emailBtn">✉️ Redactar correo de resumen</button>
    </div>
    ${list.length===0 ? `<div class="empty"><div class="ic">✅</div>No hay nada en esta vista.</div>` :
      list.map(renderReportRow).join('')}
  `;
}

function renderReportRow(r){
  const resolved = r.estado==='resuelto';
  return `
    <div class="report-row ${resolved?'resolved':''}" data-rid="${esc(r.id)}">
      <div class="check ${resolved?'on':''}" data-action="toggle" data-rid="${esc(r.id)}">${resolved?'✓':''}</div>
      <div class="report-body">
        <div class="report-top">
          <span class="item-name">${esc(r.itemNombre)}</span>
          <span class="tipo-tag ${r.tipo}">${r.tipo==='dano'?'Daño':'Compra'}</span>
          <span class="urg-tag urg-${r.urgencia}">${r.urgencia}</span>
        </div>
        <div class="report-desc">${esc(r.descripcion)}</div>
        <div class="report-foot">${esc(r.fecha)} · reportado por ${esc(r.responsable || 'sin nombre')}</div>
      </div>
      <div class="report-actions">
        <button class="btn btn-ghost btn-sm" data-action="delreport" data-rid="${esc(r.id)}">🗑️</button>
      </div>
    </div>
  `;
}

function bindPendActions(){
  document.querySelectorAll('[data-pf]').forEach(p=>p.addEventListener('click', ()=>{ state.pendFilter = p.dataset.pf; renderContent(); }));
  document.querySelectorAll('[data-action="toggle"]').forEach(c=>c.addEventListener('click', async ()=>{
    const r = state.reportes.find(x=>x.id===c.dataset.rid);
    if(r){ r.estado = r.estado==='resuelto' ? 'pendiente' : 'resuelto'; await saveReportes(); render(); }
  }));
  document.querySelectorAll('[data-action="delreport"]').forEach(c=>c.addEventListener('click', async ()=>{
    state.reportes = state.reportes.filter(x=>x.id!==c.dataset.rid);
    await saveReportes(); render();
  }));
  const emailBtn = document.getElementById('emailBtn');
  if(emailBtn) emailBtn.addEventListener('click', openEmailModal);
}

/* ---------------- Modals ---------------- */

function openModal(html){
  const wrap = document.createElement('div');
  wrap.className = 'overlay';
  wrap.innerHTML = `<div class="modal">${html}</div>`;
  document.body.appendChild(wrap);
  requestAnimationFrame(()=>wrap.classList.add('show'));
  wrap.addEventListener('click', (e)=>{ if(e.target===wrap) closeModal(wrap); });
  return wrap;
}
function closeModal(wrap){
  wrap.classList.remove('show');
  setTimeout(()=>wrap.remove(), 180);
}

function openReportModal(itemId, tipo){
  const it = state.items.find(i=>i.id===itemId);
  if(!it) return;
  const isDano = tipo==='dano';
  const wrap = openModal(`
    <h2>${isDano?'⚠️ Reportar daño':'🛒 Solicitar compra'}</h2>
    <div class="modal-sub">${esc(it.nombre)} ${it.codigo?'· '+esc(it.codigo):''}</div>
    <div class="field">
      <label>${isDano?'Describe el daño':'¿Qué se necesita comprar y por qué?'}</label>
      <textarea id="repDesc" placeholder="${isDano?'Ej: La banda tiene una rasgadura en el extremo izquierdo…':'Ej: Se agotaron las bandas amarillas, se usan a diario en clases grupales…'}"></textarea>
    </div>
    <div class="field">
      <label>Urgencia</label>
      <div class="seg" id="urgSeg">
        <div class="seg-opt" data-v="baja">Baja</div>
        <div class="seg-opt on" data-v="media">Media</div>
        <div class="seg-opt" data-v="alta">Alta</div>
      </div>
    </div>
    <div class="field">
      <label>Tu nombre (responsable del reporte)</label>
      <input id="repResp" placeholder="Ej: Chris">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="cancelBtn">Cancelar</button>
      <button class="btn btn-primary" id="saveReportBtn">Guardar reporte</button>
    </div>
  `);
  wrap.querySelectorAll('.seg-opt').forEach(o=>o.addEventListener('click', ()=>{
    wrap.querySelectorAll('.seg-opt').forEach(x=>x.classList.remove('on'));
    o.classList.add('on');
  }));
  wrap.querySelector('#cancelBtn').addEventListener('click', ()=>closeModal(wrap));
  wrap.querySelector('#saveReportBtn').addEventListener('click', async ()=>{
    const desc = wrap.querySelector('#repDesc').value.trim();
    if(!desc){ showToast('Por favor describe el detalle antes de guardar.'); return; }
    const urgencia = wrap.querySelector('.seg-opt.on').dataset.v;
    const responsable = wrap.querySelector('#repResp').value.trim();
    const report = {
      id: 'rep_'+Date.now()+'_'+Math.random().toString(36).slice(2,7),
      itemId: it.id, itemNombre: it.nombre, tipo, descripcion: desc, urgencia,
      responsable, estado: 'pendiente', fecha: new Date().toISOString().slice(0,16).replace('T',' ')
    };
    state.reportes.push(report);
    await saveReportes();
    closeModal(wrap);
    showToast(isDano?'Daño reportado.':'Solicitud de compra guardada.');
    render();
  });
  wrap.querySelector('#repDesc').focus();
}

function openEditModal(itemId){
  const it = state.items.find(i=>i.id===itemId);
  if(!it) return;
  const wrap = openModal(`
    <h2>Editar artículo</h2>
    <div class="modal-sub">${esc(it.nombre)}</div>
    <div class="mini-grid">
      <div class="field"><label>Total</label><input id="eTotal" type="number" value="${it.total||0}"></div>
      <div class="field"><label>En uso</label><input id="eUso" type="number" value="${it.uso||0}"></div>
      <div class="field"><label>Bodega</label><input id="eBodega" type="number" value="${it.bodega||0}"></div>
      <div class="field"><label>Estado</label>
        <select id="eEstado">
          <option value="" ${!it.estado?'selected':''}>—</option>
          <option value="En stock" ${it.estado==='En stock'?'selected':''}>En stock</option>
          <option value="Agotado" ${it.estado==='Agotado'?'selected':''}>Agotado</option>
          <option value="Se debe volver a comprar" ${it.estado==='Se debe volver a comprar'?'selected':''}>Se debe volver a comprar</option>
        </select>
      </div>
    </div>
    <div class="field"><label>Ubicación</label><input id="eUbic" value="${esc(it.ubicacion)}"></div>
    <div class="field"><label>Notas</label><textarea id="eNotas">${esc(it.notas)}</textarea></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="cancelBtn">Cancelar</button>
      <button class="btn btn-primary" id="saveEditBtn">Guardar cambios</button>
    </div>
  `);
  wrap.querySelector('#cancelBtn').addEventListener('click', ()=>closeModal(wrap));
  wrap.querySelector('#saveEditBtn').addEventListener('click', async ()=>{
    it.total = parseFloat(wrap.querySelector('#eTotal').value)||0;
    it.uso = parseFloat(wrap.querySelector('#eUso').value)||0;
    it.bodega = parseFloat(wrap.querySelector('#eBodega').value)||0;
    it.estado = wrap.querySelector('#eEstado').value;
    it.ubicacion = wrap.querySelector('#eUbic').value.trim();
    it.notas = wrap.querySelector('#eNotas').value.trim();
    await saveItems();
    closeModal(wrap);
    showToast('Artículo actualizado.');
    render();
  });
}

function openEmailModal(){
  const pendientes = state.reportes.filter(r=>r.estado==='pendiente');
  const wrap = openModal(`
    <h2>✉️ Redactar correo de resumen</h2>
    <div class="modal-sub">Se abrirá tu cliente de correo con ${pendientes.length} pendiente${pendientes.length!==1?'s':''} ya redactado${pendientes.length!==1?'s':''}.</div>
    <div class="field">
      <label>Enviar a</label>
      <input id="emailTo" placeholder="correo@natymarin.com" value="${esc(state.destEmail)}">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="cancelBtn">Cancelar</button>
      <button class="btn btn-primary" id="goEmailBtn">Abrir correo</button>
    </div>
  `);
  wrap.querySelector('#cancelBtn').addEventListener('click', ()=>closeModal(wrap));
  wrap.querySelector('#goEmailBtn').addEventListener('click', async ()=>{
    const to = wrap.querySelector('#emailTo').value.trim();
    state.destEmail = to;
    await saveConfig();
    const subject = `Inventario · ${pendientes.length} pendiente(s) — daños y compras`;
    const lines = [];
    lines.push(`Resumen de pendientes de implementación deportiva (${new Date().toLocaleDateString('es-CO')}):`);
    lines.push('');
    const danos = pendientes.filter(r=>r.tipo==='dano');
    const compras = pendientes.filter(r=>r.tipo==='compra');
    if(danos.length){
      lines.push(`DAÑOS (${danos.length}):`);
      danos.forEach(r=> lines.push(`- [${r.urgencia.toUpperCase()}] ${r.itemNombre}: ${r.descripcion} (reportado por ${r.responsable||'—'}, ${r.fecha})`));
      lines.push('');
    }
    if(compras.length){
      lines.push(`COMPRAS NECESARIAS (${compras.length}):`);
      compras.forEach(r=> lines.push(`- [${r.urgencia.toUpperCase()}] ${r.itemNombre}: ${r.descripcion} (reportado por ${r.responsable||'—'}, ${r.fecha})`));
      lines.push('');
    }
    lines.push('Generado desde la app de inventario de Naty Marín Wellbeing Concept.');
    const body = lines.join('\n');
    const mailto = `mailto:${encodeURIComponent(to)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    window.location.href = mailto;
    closeModal(wrap);
  });
}

init();
})();

</script>

</html>
